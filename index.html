<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IA Sem Frescura - Links</title>
  <meta name="description" content="Links da IA Sem Frescura: grupo gratuito no WhatsApp e workshop gravado.">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="fotos/logo_simbol.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=League+Spartan:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            zait: {
              'deep-teal': '#042F34',
              'charcoal-teal': '#16232B',
              'mint': '#B5F2DB',
              'yellow': '#FFC933',
              'white': '#FFFFFF',
              'pale-blue': '#E4EEF0',
            }
          },
          fontFamily: {
            sans: ['"League Spartan"', 'sans-serif'],
            serif: ['"Instrument Serif"', 'serif'],
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="style.css">

  <style>
    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
      border-radius: 20px;
      padding: 20px 28px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
      text-decoration: none;
      overflow: hidden;
    }

    .link-btn:hover {
      transform: scale(0.98) translateY(-1px);
    }

    .link-btn .btn-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-right: 16px;
    }

    .link-btn .btn-arrow {
      margin-left: auto;
      flex-shrink: 0;
      transition: transform 0.25s ease;
    }

    .link-btn:hover .btn-arrow {
      transform: translateX(4px);
    }

    .btn-whatsapp {
      background: rgba(181, 242, 219, 0.08);
      border: 1.5px solid rgba(181, 242, 219, 0.25);
      color: #B5F2DB;
    }

    .btn-whatsapp:hover {
      background: rgba(181, 242, 219, 0.15);
      border-color: rgba(181, 242, 219, 0.5);
      box-shadow: 0 0 30px rgba(181, 242, 219, 0.12);
    }

    .btn-whatsapp .btn-icon {
      background: rgba(181, 242, 219, 0.12);
    }

    .btn-workshop {
      background: rgba(255, 201, 51, 0.1);
      border: 1.5px solid rgba(255, 201, 51, 0.35);
      color: #FFC933;
    }

    .btn-workshop:hover {
      background: rgba(255, 201, 51, 0.18);
      border-color: rgba(255, 201, 51, 0.6);
      box-shadow: 0 0 30px rgba(255, 201, 51, 0.15);
    }

    .btn-workshop .btn-icon {
      background: rgba(255, 201, 51, 0.12);
    }

    .avatar-ring {
      padding: 3px;
      background: linear-gradient(135deg, rgba(181, 242, 219, 0.5), rgba(181, 242, 219, 0.1));
      border-radius: 50%;
    }

    .avatar-inner {
      width: 124px;
      height: 124px;
      border-radius: 50%;
      overflow: hidden;
      background: #16232B;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .price-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(255, 201, 51, 0.15);
      border: 1px solid rgba(255, 201, 51, 0.3);
      border-radius: 8px;
      padding: 2px 8px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #FFC933;
      margin-left: auto;
      margin-right: 12px;
    }

    .fade-in {
      animation: fadeInUp 0.7s cubic-bezier(0.23, 1, 0.32, 1) both;
    }

    .fade-in:nth-child(1) { animation-delay: 0.05s; }
    .fade-in:nth-child(2) { animation-delay: 0.15s; }
    .fade-in:nth-child(3) { animation-delay: 0.25s; }
    .fade-in:nth-child(4) { animation-delay: 0.35s; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="bg-zait-deep-teal text-zait-white font-sans antialiased min-h-screen overflow-x-hidden bg-cosmic relative">

  <!-- Three.js Particles -->
  <div id="dotted-surface" class="pointer-events-none absolute top-0 left-0 w-full h-screen overflow-hidden z-0"></div>

  <!-- Glows -->
  <div class="glow-mint" style="top: -80px; right: -100px; z-index: 1;"></div>
  <div class="glow-mint" style="bottom: 5%; left: -150px; opacity: 0.05; z-index: 1;"></div>

  <!-- Main Container -->
  <main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-5 py-16">
    <div class="w-full max-w-[420px] flex flex-col items-center">

      <!-- Profile -->
      <div class="fade-in flex flex-col items-center mb-8">
        <div class="avatar-ring mb-5">
          <div class="avatar-inner">
            <img src="fotos/michel.png" alt="IA Sem Frescura"
              class="w-full h-full object-cover"
              onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=\'font-size:2rem\'>🤖</span>'">
          </div>
        </div>

        <div
          class="inline-flex items-center gap-2 bg-zait-charcoal-teal/60 border border-zait-mint/20 rounded-full px-4 py-1.5 text-xs font-semibold text-zait-mint uppercase tracking-[0.12em] mb-4 backdrop-blur-md">
          <div class="w-1.5 h-1.5 bg-zait-mint rounded-full animate-pulse-dot"></div>
          IA Sem Frescura
        </div>

        <h1 class="text-2xl font-bold tracking-tight text-center mb-2">
          Michel Hilgemberg
        </h1>
        <p class="text-[15px] font-light text-zait-pale-blue/70 text-center leading-relaxed max-w-[300px]">
          IA prática pra você usar hoje, sem frescura.
        </p>

        <p class="text-[13px] font-medium text-zait-pale-blue/50 text-center mt-3">
          + de <span class="text-zait-mint font-semibold">1.500 pessoas</span> aprendem IA comigo
        </p>
      </div>

      <!-- Botões -->
      <div class="fade-in w-full flex flex-col gap-4">

        <!-- Botão 1: Grupo WhatsApp -->
        <a href="https://grupo.iasemfrescura.com" target="_blank" rel="noopener noreferrer"
          class="link-btn btn-whatsapp fade-in">
          <div class="btn-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
              </path>
            </svg>
          </div>
          <div class="flex flex-col">
            <span class="text-base font-bold leading-tight">Grupo Gratuito no WhatsApp</span>
            <span class="text-xs font-normal opacity-60 mt-0.5">Skills de IA, conteúdo prático e networking</span>
          </div>
          <div class="btn-arrow">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
          </div>
        </a>

        <!-- Botão 2: Workshop Gravado -->
        <a href="https://pay.kiwify.com.br/DmP7zA1" target="_blank" rel="noopener noreferrer"
          class="link-btn btn-workshop fade-in">
          <div class="btn-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="23 7 16 12 23 17 23 7"></polygon>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
            </svg>
          </div>
          <div class="flex flex-col">
            <span class="text-base font-bold leading-tight">Workshop Gravado</span>
            <span class="text-xs font-normal opacity-60 mt-0.5">Acesso imediato · Aprenda no seu ritmo</span>
          </div>
          <div class="price-badge">R$&nbsp;97,90</div>
          <div class="btn-arrow">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M12 5l7 7-7 7" />
            </svg>
          </div>
        </a>

      </div>

      <!-- Footer -->
      <div class="fade-in mt-10 text-center">
        <p class="text-xs font-light text-zait-pale-blue/30">&copy; 2026 IA Sem Frescura</p>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
  <script>
    lucide.createIcons();
  </script>

</body>

</html>
